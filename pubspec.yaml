name: pick_a_place
description: "A pick a place app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  confetti: ^0.7.0
  http: ^1.1.0
  geolocator: ^10.1.0
  url_launcher: ^6.2.2
  shared_preferences: ^2.2.2
  google_mobile_ads: ^6.0.0
  easy_localization: ^3.0.8
  flutter_fortune_wheel: ^1.2.0
  rxdart: ^0.27.7 
  firebase_core: ^4.3.0
  firebase_analytics: ^12.1.0
  firebase_crashlytics: ^5.0.6
  flutter_dotenv: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  change_app_package_name: ^1.5.0
  flutter_native_splash: ^2.4.7
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/logo/
    - assets/images/icons/
    - assets/images/roulette_wheel/
    - assets/images/categories_turkish/
    - assets/images/categories_english/
    - assets/files/
    - assets/languages/
    - assets/files/category_filters_tr.json
    - assets/files/category_filters_en.json

  fonts:
    - family: Fonts
      fonts:
        - asset: assets/fonts/ImperialScript-Regular.ttf

flutter_native_splash:
  color: "#7B281C"
  image: assets/images/logo/splash_deneme.png
  fullscreen: false

  android_12:
    image: assets/images/logo/splash_deneme.png
    color: "#7B281C"
    icon_background_color: "#7B281C"
  

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo/deneme_icon4.png"
  min_sdk_android: 21 
  remove_alpha_ios: true 
  adaptive_icon_background: "#7B281C" 
  adaptive_icon_foreground: "assets/images/logo/deneme_icon4.png" 
